    <!-- PWA — manifest dinámico por-org: la app instalada toma nombre+logo de la
         distribuidora del dominio (ej. "Aryes" en pedidos.aryes.com.uy). -->
    <link rel="manifest" href="/api/manifest">
    <meta name="theme-color" content="#1a8a3c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pazque">
    <link rel="apple-touch-icon" href="/pazque-logo.png">
    <meta name="description" content="Sistema de gestión para distribuidoras — inventario, ventas, rutas y portal B2B">
    <!-- Fuentes web — sin esto todo caía a system-ui (la marca/portal se veían genéricos).
         display=swap evita FOIT: muestra fallback y cambia al cargar. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&family=DM+Serif+Display&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700;800&display=swap">
    <style>
      /* Accesibilidad: respetar a quienes piden menos movimiento (WCAG 2.3.3) */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
      /* Foco visible para navegación por teclado (WCAG 2.4.7) */
      a:focus-visible, button:focus-visible, input:focus-visible,
      select:focus-visible, textarea:focus-visible, [tabindex]:focus-visible {
        outline: 2px solid #059669;
        outline-offset: 2px;
        border-radius: 4px;
      }
      /* Skeleton shimmer — comunica "cargando" en vez de "vacío/roto" */
      .sk-shimmer {
        background: #eef0ee;
        background-image: linear-gradient(90deg, #eef0ee 0px, #f6f7f6 40px, #eef0ee 80px);
        background-size: 600px 100%;
        animation: skShimmer 1.4s ease-in-out infinite;
      }
      @keyframes skShimmer {
        0%   { background-position: -300px 0; }
        100% { background-position: 300px 0; }
      }
    </style>
